services:
  bddb:
    build: .
    image: bddb:latest
    container_name: bddb
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - C:/Users/zhang/.bddb:/app/data
    environment:
      - QB_HOST=${QB_HOST:-localhost:18000}
      - QB_USER=${QB_USER:-}
      - QB_PASS=${QB_PASS:-}
